<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>業務管理アプリPro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.js"></script>
    <style>
        body { background-color: #f8fafc; touch-action: manipulation; }
        #calendar { background: white; max-height: 55vh; border-radius: 8px; overflow: hidden; }
        .fc-toolbar-title { font-size: 1rem !important; font-weight: bold; }
        .fc-button { padding: 4px 8px !important; font-size: 0.75rem !important; }
        .fc-daygrid-day-number { font-size: 0.75rem; padding: 4px !important; }
        .fc-event-title { font-size: 0.6rem !important; text-align: center; font-weight: bold; }
        .selected-status { outline: 3px solid #000; box-shadow: 0 0 10px rgba(0,0,0,0.3); z-index: 10; }
        /* 土日の色付けを復活 */
        .fc-day-sun { background-color: #fff1f2 !important; } /* 日曜日：薄赤 */
        .fc-day-sat { background-color: #f0f9ff !important; } /* 土曜日：薄青 */
        .fc-daygrid-event-harness { margin-bottom: 1px !important; }
    </style>
</head>
<body class="p-2 text-gray-800">
    <div class="max-w-md mx-auto space-y-2">
        
        <div class="bg-white p-3 rounded-lg shadow-sm border">
            <div class="flex justify-between items-center mb-3">
                <h1 class="font-bold text-sm text-blue-600 italic">SCHEDULE COUNTER</h1>
                <div class="flex gap-1">
                    <button onclick="toggleMenu('settings-menu')" class="text-[10px] text-gray-500 border px-1 rounded">項目編集</button>
                    <button onclick="toggleMenu('backup-menu')" class="text-[10px] text-blue-400 border px-1 rounded">連携</button>
                </div>
            </div>

            <div id="settings-menu" class="hidden bg-blue-50 p-2 mb-3 rounded border text-[11px] space-y-2">
                <p class="font-bold text-blue-700">項目の追加と色選択</p>
                <div class="flex gap-1">
                    <input type="text" id="new-label" placeholder="項目名" class="border p-1 rounded flex-grow">
                    <input type="color" id="new-color" value="#3b82f6" class="w-8 h-7 border rounded">
                    <button onclick="addNewStatus()" class="bg-blue-600 text-white px-2 rounded font-bold">追加</button>
                </div>
                <div id="edit-list" class="flex flex-wrap gap-1 mt-2"></div>
                <p class="text-[9px] text-gray-400">※項目をタップすると削除できます。</p>
            </div>

            <div id="backup-menu" class="hidden bg-gray-50 p-2 mb-3 rounded border text-[11px] space-y-2">
                <div class="flex gap-2">
                    <button onclick="exportData()" class="bg-blue-500 text-white px-2 py-1 rounded flex-grow">データをコピー</button>
                    <button onclick="importData()" class="bg-orange-500 text-white px-2 py-1 rounded flex-grow">データを復元</button>
                </div>
            </div>

            <div id="palette" class="flex flex-wrap gap-1.5 mb-2"></div>
            
            <div class="flex justify-between items-center mt-3 pt-2 border-t">
                <button onclick="selectStatus('clear', '', '消去')" id="btn-clear" class="px-2 py-1 text-[10px] rounded border bg-gray-50 text-gray-400 font-bold italic text-xs">Eraser</button>
                <button onclick="saveAllData()" class="bg-blue-600 text-white px-8 py-1.5 rounded-full font-bold text-xs shadow-md">保存</button>
            </div>
        </div>

        <div id="calendar" class="border shadow-sm"></div>

        <div class="bg-white p-3 rounded-lg border shadow-sm">
            <h2 class="text-[10px] font-bold text-gray-400 mb-2 uppercase tracking-wider text-center italic">Monthly Counter</h2>
            <div id="summary-list" class="flex flex-wrap gap-1.5 justify-center"></div>
        </div>
    </div>

    <script>
        let calendar = null;
        let currentStatus = null;
        
        const initialStatusList = [
            { id: 'st1', label: 'パナ昼', color: '#3b82f6' },
            { id: 'st2', label: 'パナ夜', color: '#1e40af' },
            { id: 'st3', label: 'アート', color: '#a855f7' },
            { id: 'st4', label: 'ハンデ', color: '#ef4444' }
        ];

        let statusList = JSON.parse(localStorage.getItem('my_status_list')) || initialStatusList;

        document.addEventListener('DOMContentLoaded', function() {
            renderPalette();
            renderEditList();
            initCalendar();
        });

        function initCalendar() {
            const calendarEl = document.getElementById('calendar');
            const savedEvents = JSON.parse(localStorage.getItem('my_calendar_events')) || [];

            calendar = new FullCalendar.Calendar(calendarEl, {
                initialView: 'dayGridMonth',
                locale: 'ja',
                height: 'auto',
                headerToolbar: { left: 'prev,next', center: 'title', right: 'today' },
                events: savedEvents,
                datesSet: () => updateSummary(),
                dateClick: function(info) {
                    if (!currentStatus) return;
                    
                    const existingEvents = calendar.getEvents().filter(e => e.startStr === info.dateStr);
                    
                    if (currentStatus.id === 'clear') {
                        existingEvents.forEach(e => e.remove());
                    } else {
                        const isDuplicate = existingEvents.some(e => e.title === currentStatus.label);
                        if (!isDuplicate && existingEvents.length < 2) {
                            calendar.addEvent({
                                title: currentStatus.label,
                                start: info.dateStr,
                                backgroundColor: currentStatus.color,
                                borderColor: currentStatus.color,
                                allDay: true
                            });
                        } else if (existingEvents.length >= 2) {
                            alert("1日に登録できるのは2項目までです");
                        }
                    }
                    updateSummary();
                },
                eventClick: function(info) {
                    if (confirm("この予定を削除しますか？")) {
                        info.event.remove();
                        updateSummary();
                    }
                }
            });
            calendar.render();
        }

        function addNewStatus() {
            const label = document.getElementById('new-label').value;
            const color = document.getElementById('new-color').value;
            if (!label) return;
            const newStatus = { id: 'st' + Date.now(), label, color };
            statusList.push(newStatus);
            localStorage.setItem('my_status_list', JSON.stringify(statusList));
            document.getElementById('new-label').value = '';
            renderPalette();
            renderEditList();
            updateSummary();
        }

        function deleteStatus(id) {
            if (confirm("この項目を削除しますか？")) {
                statusList = statusList.filter(st => st.id !== id);
                localStorage.setItem('my_status_list', JSON.stringify(statusList));
                renderPalette();
                renderEditList();
                updateSummary();
            }
        }

        function renderPalette() {
            const paletteEl = document.getElementById('palette');
            paletteEl.innerHTML = '';
            statusList.forEach(st => {
                const btn = document.createElement('button');
                btn.innerText = st.label;
                btn.id = 'btn-' + st.id;
                btn.className = `status-btn px-3 py-2 rounded-lg text-white text-[11px] font-black shadow-sm flex-grow min-w-[70px]`;
                btn.style.backgroundColor = st.color;
                btn.onclick = () => selectStatus(st.id, st.color, st.label);
                paletteEl.appendChild(btn);
            });
        }

        function renderEditList() {
            const editListEl = document.getElementById('edit-list');
            editListEl.innerHTML = '';
            statusList.forEach(st => {
                const span = document.createElement('span');
                span.innerText = st.label + " ×";
                span.className = "px-2 py-1 rounded text-[10px] text-white cursor-pointer mb-1";
                span.style.backgroundColor = st.color;
                span.onclick = () => deleteStatus(st.id);
                editListEl.appendChild(span);
            });
        }

        function updateSummary() {
            const summaryListEl = document.getElementById('summary-list');
            summaryListEl.innerHTML = '';
            const currentViewDate = calendar.getDate();
            const currentMonth = currentViewDate.getMonth();
            const currentYear = currentViewDate.getFullYear();

            const monthEvents = calendar.getEvents().filter(e => {
                const eventDate = new Date(e.startStr);
                return eventDate.getMonth() === currentMonth && eventDate.getFullYear() === currentYear;
            });
            
            statusList.forEach(status => {
                const count = monthEvents.filter(e => e.title === status.label).length;
                const box = document.createElement('div');
                box.className = "flex flex-col items-center p-2 rounded-lg border bg-white min-w-[60px]";
                box.innerHTML = `
                    <span class="text-[9px] font-bold text-gray-400 mb-1">${status.label}</span>
                    <span class="text-sm font-black" style="color: ${status.color}">${count}<small class="text-[9px] ml-0.5">回</small></span>
                `;
                summaryListEl.appendChild(box);
            });
        }

        function selectStatus(id, color, label) {
            currentStatus = { id, color, label };
            document.querySelectorAll('.status-btn, #btn-clear').forEach(btn => btn.classList.remove('selected-status'));
            const activeBtn = document.getElementById('btn-' + id);
            if (activeBtn) activeBtn.classList.add('selected-status');
        }

        function toggleMenu(id) {
            document.getElementById(id).classList.toggle('hidden');
        }

        function saveAllData() {
            const events = calendar.getEvents().map(e => ({
                title: e.title,
                start: e.startStr,
                backgroundColor: e.backgroundColor,
                borderColor: e.borderColor,
                allDay: true
            }));
            localStorage.setItem('my_calendar_events', JSON.stringify(events));
            alert('保存完了！');
        }

        function exportData() {
            const data = localStorage.getItem('my_calendar_events');
            navigator.clipboard.writeText(data).then(() => alert("コピーしました"));
        }

        function importData() {
            const input = prompt("バックアップを貼り付けてください");
            if (input) {
                localStorage.setItem('my_calendar_events', input);
                location.reload();
            }
        }

        function resetAll() {
            if(confirm('すべて初期化しますか？')) {
                localStorage.clear();
                location.reload();
            }
        }
    </script>
</body>
</html>
